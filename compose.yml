services:
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "cub", "kafka-ready", "-b", "kafka:29092", "1", "20"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_INIT_TOPICS: ${KAFKA_INIT_TOPICS:-order.event:1,delivery.event:1}
    command: >
      bash -c "
        set -e;
        IFS=',' read -ra TOPICS <<< \"$${KAFKA_INIT_TOPICS}\";
        for ITEM in \"$${TOPICS[@]}\"; do
          TOPIC=\"$${ITEM%%:*}\";
          PARTITIONS=\"$${ITEM##*:}\";
          echo \"Ensuring topic '$${TOPIC}' with $${PARTITIONS} partition(s)\";
          kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic \"$${TOPIC}\" --partitions \"$${PARTITIONS}\" --replication-factor 1;
        done
      "
    restart: "no"
    networks:
      - app-network

  kafdrop:
    image: obsidiandynamics/kafdrop:4.2.0
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
    restart: unless-stopped
    networks:
      - app-network

  simulator:
    image: simulator
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-order-lifecycle-simulator}
    restart: unless-stopped
    networks:
      - app-network

volumes:
  kafka-data:

networks:
  app-network:
    driver: bridge
